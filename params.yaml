# =============================================================================
# AQI PREDICTION MLOps - COMPLETE PARAMETER CONFIGURATION
# =============================================================================

project:
  name: "aqi-prediction-mlops"
  version: "1.0.0"
  random_state: 42

dagshub:
  repo_owner: ${DAGSHUB_REPO_OWNER}
  repo_name: ${DAGSHUB_REPO_NAME}
  remote_name: "dagshub"
  mlflow_tracking_uri: "https://dagshub.com/${DAGSHUB_REPO_OWNER}/${DAGSHUB_REPO_NAME}.mlflow"

# =============================================================================
# DATA INGESTION
# =============================================================================
data_ingestion:
  start_date: "2022-08-05"
  end_date: null
  raw_dir: "data/raw"
  checkpoint_file: "ingestion_checkpoint.json"
  timeout: 120
  retry_attempts: 5
  requests_per_minute: 15

# =============================================================================
# DATA PREPROCESSING
# =============================================================================
data_preprocessing:
  input_path: "data/raw/aqi_india_raw.parquet"
  output_dir: "data/processed"
  drop_columns:
    - "eu_aqi"
    - "eu_aqi_pm10"
    - "eu_aqi_pm25"
    - "rain_mm"
    - "solar_radiation_wm2"
    - "us_aqi_no2"
    - "us_aqi_pm10"
    - "us_aqi_pm25"
    - "week_of_year"
  winsorize_limits: [0.005, 0.003]
  knn_neighbors: 5

# =============================================================================
# FEATURE ENGINEERING
# =============================================================================
feature_engineering:
  input_path: "data/processed/aqi_india_processed.parquet"
  output_dir: "data/features"
  target: "us_aqi"
  categorical_columns: ["city", "state"]
  encoding_method: "label"

# =============================================================================
# FEATURE SELECTION
# =============================================================================
feature_selection:
  input_path: "data/features/aqi_features.parquet"
  output_dir: "data/features/selection"
  top_n: 30
  must_have:
    - "latitude"
    - "longitude"
    - "month"
    - "city_encoded"
    - "state_encoded"
    - "is_weekend"

# =============================================================================
# DATA SPLITTING
# =============================================================================
data_splitting:
  input_path: "data/features/selection/aqi_selected_features.parquet"
  output_dir: "data/splits"
  test_size: 0.15
  val_size: 0.15
  stratify: true

# =============================================================================
# MODEL TRAINING (Only XGBoost + Others Optional)
# =============================================================================
model_training:
  target: "us_aqi"
  models:
    - "xgboost"
    - "catboost"
    - "random_forest"
    - "extra_trees"
  primary_metric: "r2"

# =============================================================================
# XGBoost HYPERPARAMETERS (Best from Optuna)
# =============================================================================
model_params:
  xgboost:
    n_estimators: 600
    max_depth: 10
    learning_rate: 0.08
    subsample: 0.85
    colsample_bytree: 0.95
    colsample_bylevel: 0.75
    reg_alpha: 0.0001
    reg_lambda: 0.00001
    min_child_weight: 7
    gamma: 0.5
    max_bin: 128
    tree_method: "hist"
    n_jobs: 4
    random_state: 42

# =============================================================================
# MODEL OPTIMIZATION
# =============================================================================
model_optimization:
  input_model: "models/xgboost.json"
  output_dir: "models/optimized"
  target_size_mb: 25.0
  compression: "gzip"
  precision_reduction: true
  retrain_with_best: true

# =============================================================================
# LIVE PREDICTION
# =============================================================================
prediction:
  default_city: "Delhi"
  default_days: 2
  max_days: 3
  openmeteo:
    weather_url: "https://api.open-meteo.com/v1/forecast"
    aq_url: "https://air-quality-api.open-meteo.com/v1/air-quality"